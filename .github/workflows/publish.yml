name: Publish to PyPI

# ─────────────────────────────────────────────────────────────────────────────
# Triggers ONLY when you push a version tag, e.g.:
#   git tag v0.2.0
#   git push --tags
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # matches v0.2.0, v1.0.0, etc.

jobs:
  build-and-publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest

    # Required for PyPI Trusted Publisher (OIDC) — no API token needed
    environment: pypi
    permissions:
      id-token: write   # OIDC token for Trusted Publisher
      contents: read

    steps:
      # 1. Checkout the tagged commit
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install build tool
      - name: Install build
        run: pip install build --quiet

      # 4. Build source distribution + wheel
      - name: Build package
        run: python -m build

      # 5. Publish to PyPI via Trusted Publisher (OIDC)
      #    No secrets required — configure Trusted Publisher on pypi.org instead
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
